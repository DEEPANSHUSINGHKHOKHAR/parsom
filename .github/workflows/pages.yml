name: Deploy frontends to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            apps/web/package-lock.json
            apps/admin/package-lock.json

      - name: Build web
        working-directory: apps/web
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_BASE_PATH: /parsom/web/
        run: |
          npm ci
          npm run build

      - name: Build admin
        working-directory: apps/admin
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_BASE_PATH: /parsom/admin/
        run: |
          npm ci
          npm run build

      - name: Assemble Pages artifact
        shell: bash
        run: |
          mkdir -p pages/web pages/admin
          cp -R apps/web/dist/. pages/web/
          cp -R apps/admin/dist/. pages/admin/
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Parsom</title>
              <style>
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  font-family: Arial, sans-serif;
                  background: #f6f3ef;
                  color: #181411;
                }
                main {
                  width: min(92vw, 520px);
                }
                h1 {
                  margin: 0 0 12px;
                  font-size: 42px;
                }
                p {
                  margin: 0 0 24px;
                  color: #5b524b;
                }
                a {
                  display: block;
                  margin: 12px 0;
                  padding: 14px 16px;
                  border: 1px solid #d6ccc2;
                  border-radius: 8px;
                  color: inherit;
                  text-decoration: none;
                  background: #fff;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>Parsom</h1>
                <p>Choose which frontend to open.</p>
                <a href="./web/">Customer storefront</a>
                <a href="./admin/">Admin panel</a>
              </main>
            </body>
          </html>
          HTML
          cp pages/web/index.html pages/web/404.html
          cp pages/admin/index.html pages/admin/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
